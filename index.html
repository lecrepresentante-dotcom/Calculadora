  <script>
  // Fora do Claude.ai não existe "window.storage" — este shim replica a mesma
// interface (get/set/delete), mas gravando de verdade no localStorage do
// navegador, então os dados ficam salvos no computador ou iPhone entre usos.
(function () {
  function key(k, shared) {
    return (shared ? "shared:" : "personal:") + k;
  }
  window.storage = {
    get: function (k, shared) {
      return new Promise(function (resolve, reject) {
        try {
          const raw = localStorage.getItem(key(k, shared));
          if (raw === null) {
            reject(new Error("not found"));
            return;
          }
          resolve({ key: k, value: raw, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
    set: function (k, value, shared) {
      return new Promise(function (resolve, reject) {
        try {
          localStorage.setItem(key(k, shared), value);
          resolve({ key: k, value: value, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
    delete: function (k, shared) {
      return new Promise(function (resolve, reject) {
        try {
          localStorage.removeItem(key(k, shared));
          resolve({ key: k, deleted: true, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
    list: function (prefix, shared) {
      return new Promise(function (resolve, reject) {
        try {
          const pfx = (shared ? "shared:" : "personal:") + (prefix || "");
          const keys = [];
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.indexOf(pfx) === 0) keys.push(k.slice((shared ? 7 : 9)));
          }
          resolve({ keys: keys, prefix: prefix, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
  };
})();

  </script>
