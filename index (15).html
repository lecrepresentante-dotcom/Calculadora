  // Fora do Claude.ai não existe "window.storage" — este shim replica a mesma
// interface (get/set/delete), mas gravando de verdade no localStorage do
// navegador, então os dados ficam salvos no computador ou iPhone entre usos.
(function () {
  function key(k, shared) {
    return (shared ? "shared:" : "personal:") + k;
  }
  window.storage = {
    get: function (k, shared) {
      return new Promise(function (resolve, reject) {
        try {
          const raw = localStorage.getItem(key(k, shared));
          if (raw === null) {
            reject(new Error("not found"));
            return;
          }
          resolve({ key: k, value: raw, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
    set: function (k, value, shared) {
      return new Promise(function (resolve, reject) {
        try {
          localStorage.setItem(key(k, shared), value);
          resolve({ key: k, value: value, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
    delete: function (k, shared) {
      return new Promise(function (resolve, reject) {
        try {
          localStorage.removeItem(key(k, shared));
          resolve({ key: k, deleted: true, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
    list: function (prefix, shared) {
      return new Promise(function (resolve, reject) {
        try {
          const pfx = (shared ? "shared:" : "personal:") + (prefix || "");
          const keys = [];
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.indexOf(pfx) === 0) keys.push(k.slice((shared ? 7 : 9)));
          }
          resolve({ keys: keys, prefix: prefix, shared: !!shared });
        } catch (e) {
          reject(e);
        }
      });
    },
  };
})();

    const padLen = width - t.length;

    return align === "left" ? t + spaces : spaces + t;
}

function parseRolWorkbookToData(workbook) {
    const wsRolName = workbook.SheetNames.find((n) => n.trim().toLowerCase() === "rol");
    const wsQtName = workbook.SheetNames.find((n) => n.trim().toLowerCase() === "qt_desc");
    if (!wsRolName || !wsQtName) {
        throw new Error('O arquivo precisa conter as abas "Rol" e "QT_Desc".');
    }
    const rolRows = XLSX.utils.sheet_to_json(workbook.Sheets[wsRolName], { header: 1, defval: null });
    const qtRows = XLSX.utils.sheet_to_json(workbook.Sheets[wsQtName], { header: 1, defval: null });
    const colLetters = [3, 5, 7, 9, 11]; // 0-based: D,F,H,J,L

    const produtos = [];

    for (let i = 1; i < rolRows.length; i++) {
        const row = rolRows[i] || [];
        const indxCell = row[0];
        const indx = indxCell !== null && indxCell !== undefined ? indxCell : currentIndx;
        const nome = row[1];
        if (!nome)
            continue;
        currentIndx = indx;
        const colunas = [];
        headerLabels.forEach((label, idx) => {
            const v = row[colLetters[idx]];
            if (v !== null && v !== undefined && v !== "") {
                colunas.push({ label, valor: typeof v === "number" ? v : parseFloat(String(v).replace(",", ".")) });
            }
        });
        produtos.push({
            indx: String(indx),
            produto: String(nome).trim(),
            colunas,
            tiers: [],
        });
    }
    // Agrupa QT_Desc pelo número do grupo. Duas variações de planilha são aceitas:
    //  (a) o número fica em sua própria coluna A (preenchido só na 1a linha do grupo,
    //      igual à coluna INDX da aba Rol) — formato atual;
    //  (b) o número vem embutido no início do nome do produto (ex.: "5. Produto") —
    //      formato antigo, mantido como alternativa por segurança.
    // Todas as faixas de quantidade/desconto encontradas sob um mesmo número
    // pertencem ao CONJUNTO inteiro de produtos daquele número, não a uma linha só.
    const usaColunaA = qtRows.slice(1).some((r) => r && r[0] !== null && r[0] !== undefined && r[0] !== "");
    const gruposQt = {};
    let grupoAtual = null;
    for (let i = 1; i < qtRows.length; i++) {
        const row = qtRows[i] || [];
        const grpCell = row[0];
        const nome = row[1];
        const qtd = row[2];
        const desc = row[3];
        if (usaColunaA) {
            if (grpCell !== null && grpCell !== undefined && grpCell !== "") {
                grupoAtual = String(grpCell);
                if (!gruposQt[grupoAtual])
                    gruposQt[grupoAtual] = { tiers: [] };
            }
        }
        else if (nome) {
            const m = String(nome).match(/^\s*(\d+[A-Za-z]?)\.\s*(.*)$/);
            grupoAtual = m ? m[1] : String(nome).trim();
            if (!gruposQt[grupoAtual])
                gruposQt[grupoAtual] = { tiers: [] };
        }
        if (grupoAtual !== null && qtd !== null && qtd !== undefined && desc !== null && desc !== undefined) {
            const descNum = typeof desc === "number" ? desc : parseFloat(String(desc).replace(",", "."));

function parseWorkbookToData(workbook) {
    const wsD = workbook.Sheets["Descontos"];
    const wsP = workbook.Sheets["Produtos"];
    if (!wsD || !wsP) {
        throw new Error('O arquivo precisa conter as abas "Descontos" e "Produtos".');
    }
    const dRows = XLSX.utils.sheet_to_json(wsD, { header: 1, defval: null });
    const pRows = XLSX.utils.sheet_to_json(wsP, { header: 1, defval: null });
    const linhaToTiers = {};
    for (let i = 1; i < dRows.length; i++) {
        const row = dRows[i] || [];
        const linha = row[1];
        if (!linha)
            continue;
        const qtRaw = row[2];
        let qtf = parseFloat(String(qtRaw).replace(",", "."));
        if (Number.isNaN(qtf))
            qtf = 0;
        const desconto = typeof row[3] === "number" ? row[3] : parseFloat(row[3]) || 0;
        if (!linhaToTiers[linha])
            linhaToTiers[linha] = [];
        linhaToTiers[linha].push({ qtf, qt: qtRaw, desconto });
    }
    Object.values(linhaToTiers).forEach((arr) => arr.sort((a, b) => a.qtf - b.qtf));
    const data = {};
    let produtosSemPreco = 0;
    for (let i = 1; i < pRows.length; i++) {
        const row = pRows[i] || [];
        const id = row[0];
        const linha = row[1];
        const nome = row[2];
        const preco = typeof row[3] === "number" ? row[3] : parseFloat(row[3]);
        const imagem = row[4] || null;
        if (id == null && nome == null)
            continue;
        if (nome == null)
            continue;
        if (Number.isNaN(preco)) {
            produtosSemPreco++;
            continue;
        }
        const tiersSrc = linhaToTiers[linha] || [];
        const tiers = tiersSrc.length === 0
            ? [{ qt: 0, desconto: 0, preco: round4(preco) }]
            : tiersSrc.map((t) => ({
                qt: t.qt,
                desconto: round4(t.desconto || 0),
                preco: round4(preco * (1 - (t.desconto || 0))),
            }));
        data[nome] = { id, linha, preco_base: round4(preco), imagem, tiers };
    }
    if (Object.keys(data).length === 0) {
        throw new Error("Nenhum produto válido foi encontrado na aba Produtos.");
    }
    return { data, produtosSemPreco };
}
